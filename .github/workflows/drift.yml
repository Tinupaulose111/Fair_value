name: Drift Detection (Weekly)

on:
  schedule:
    - cron: "0 2 * * 0"   # Sunday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  drift-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ✅ THIS IS THE KEY FIX
      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=${GITHUB_WORKSPACE}" >> $GITHUB_ENV

      - name: Install drift dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r drift/requirements-locked.txt || pip install -r drift/requirements.txt

      - name: Run Drift Detection
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          REPO_OWNER: tinupaulose111
          REPO_NAME: Fair_value
          TRAINER_WORKFLOW: retrain.yml
          TARGET_BRANCH: main
        run: |
          python drift/drift_monitor.py

