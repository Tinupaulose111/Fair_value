name: CI/CD — API Service

on:
  push:
    paths:
      - "api/**"
      - "core/**"
      - "model/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: fairvalue-api
  OWNER: tinupaulose111

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ env.OWNER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test API image
        run: |
          docker run --rm \
            ghcr.io/${{ env.OWNER }}/${{ env.IMAGE_NAME }}:latest \
            python -c "from app import app; print('API import successful')"

      - name: Deploy API to Oracle VM
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e

            IMAGE="ghcr.io/${{ env.OWNER }}/${{ env.IMAGE_NAME }}:latest"
            PROJECT_DIR="/home/${{ secrets.SSH_USER }}/fairvalue_new"

            echo "Deploying $IMAGE"

            mkdir -p $PROJECT_DIR/{model,data,metrics,drift_artifacts}

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull $IMAGE

            docker stop fairvalue-api || true
            docker rm fairvalue-api || true

            docker run -d \
              --name fairvalue-api \
              --restart always \
              -p 5000:5000 \
              -v $PROJECT_DIR/model:/app/model \
              -v $PROJECT_DIR/data:/app/data \
              -v $PROJECT_DIR/metrics:/app/metrics \
              -v $PROJECT_DIR/drift_artifacts:/app/drift_artifacts \
              $IMAGE

